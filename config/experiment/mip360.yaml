# @package _global_

defaults:
  - override /dataset: mip360
  - override /initializer@model.initializer: point_cloud

model:
  loss_weights:
    rgb: 16.0
    eikonal_neg: 0.0
    eikonal_pos: 0.0
    curvature: 4.0
    sdf_binary: 0.05
    sh: 1.0

  tesseract:
    center_resolution:
      0: 32
      2400: 64
      4800: 128
      6400: 192
      8000: 256
      9600: 320
      11200: 384
      12800: 448
      14400: 512
      16000: 576
      17600: 640
      19200: 704
      20800: 768
      22400: 1024
      24000: 1536
    arm_resolution:
      0: 32
      1200: 64
      2400: 96
      4800: 128
    center_extent: 0.5
    active_sh_degree:
      0: 0
      600: 1

train:
  batch_size:
    14400: 8
    16000: 4
  learning_rate:
    base: 8e-3
    schedule:
      14400: 0.5
      16000: 0.25


  num_steps: 30000
  visualization_interval: 400
  val_interval: 1599
  checkpoint_interval: 1599
