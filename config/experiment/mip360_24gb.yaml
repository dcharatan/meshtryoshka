# @package _global_

defaults:
  - override /dataset: mip360
  - override /initializer@model.initializer: point_cloud

model:
  loss_weights:
    rgb: 16.0
    eikonal_neg: 0.0
    eikonal_pos: 0.0
    curvature: 4.0
    sdf_binary: 0.05
    sh: 1.0

  tesseract:
    center_resolution:
      0: 32
      2400: 64
      4800: 128
      6400: 192
      8000: 256
      9600: 320
      11200: 384
      14400: 448
      17600: 512
      20800: 576
      24000: 640
      27200: 704
      30400: 768
      33600: 1024
      36800: 1536
    arm_resolution:
      0: 32
      1200: 64
      2400: 96
      4800: 128
    center_extent: 0.5
    active_sh_degree:
      0: 0
      600: 1

train:
  batch_size:
    4800: 8
    9600: 4
    11200: 2
    12800: 1
  learning_rate:
    base: 8e-3
    schedule:
      4800: 1.0
      9600: 0.5
      11200: 0.5
      12800: 0.25

  # A Mip-NeRF 360 dataset takes ~2 GB of memory, so it's best to store it on the CPU
  # if the overall memory budget is only 24 GB.
  dataset_device: cpu

  num_steps: 30000
  visualization_interval: 400
  val_interval: 1599
  checkpoint_interval: 1599
