# @package _global_

defaults:
  - override /dataset: mip360
  - override /initializer@model.initializer: point_cloud

model:
  render_mode: explicit
  loss_weights:
    rgb: 16.0
    eikonal_neg: 0.0
    eikonal_pos: 0.0
    curvature: 4.0
    sdf_binary: 0.05
    sh: 1.0

  tesseract:
    center_resolution:
      0: 32
      4800: 64
      9600: 128
      12800: 192
      16000: 256
      19200: 320
      22400: 384
      25600: 448
      28800: 512
      32000: 576
      35200: 640
      38400: 704
      41600: 768
      44800: 1024
      48000: 1536
    arm_resolution:
      0: 32
      2400: 64
      4800: 96
      9600: 128
    center_extent: 0.5
    active_sh_degree:
      0: 0
      1200: 1

train:
  batch_size:
    0: 4
    16000: 2
    28800: 2
    32000: 1
  learning_rate:
    base: 8e-3
    schedule:
      0: 0.5
      16000: 0.25
      28800: 0.25
      32000: 0.125


  num_steps: 60000
  visualization_interval: 100
  val_interval: 3199
  checkpoint_interval: 3199
